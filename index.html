<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mercanto · Pipeline de reclutamiento</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" />
<style>
  :root {
    --olive: #273D37;
    --mint: #A9FFAE;
    --spring-wood: #EDFBEE;
    --purple: #9B99FF;
    --lilac: #E9DEFC;
    --cream: #FFF3DE;
    --earl-gray: #F9FAFC;
    --matcha: #92939D;
    --blue-skies: #EAFAFF;
    --peaches: #FFE2CC;
    --pinetree: #1B2B26;
    --text-black: #121212;
    --text-dark: #323338;
    --text-blue: #242A42;
    --white: #FFFFFF;
    --gray-5: #C2CEDB;
    --gray-6: #D3DCE6;
    --gray-7: #E5E9F2;
    --gray-8: #EFF2F7;
    --gray-9: #F9FAFC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--spring-wood);
    color: var(--text-black);
  }
  .topbar-brand {
    background: var(--olive);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-square { width: 22px; height: 22px; background: var(--mint); border-radius: 4px; flex-shrink: 0; }
  .brand-name { font-size: 18px; font-weight: 700; color: var(--white); letter-spacing: -0.01em; }
  .brand-tag { font-size: 12px; color: var(--mint); }
  .status-banner { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--mint); }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); }

  .content { padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; color: var(--olive); }
  .sub { font-size: 13px; color: var(--text-dark); margin: 0 0 20px; }
  .last-update { font-size: 12px; color: var(--matcha); margin: -14px 0 20px; display: flex; align-items: center; gap: 6px; }

  .topbar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  input, select, textarea {
    font-family: inherit; font-size: 14px; border: 1px solid var(--gray-6); border-radius: 8px;
    padding: 8px 10px; background: var(--white); color: var(--text-black);
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--purple); }
  #search { flex: 1; min-width: 200px; height: 38px; }
  button {
    font-family: inherit; font-size: 13px; font-weight: 500; border: 1px solid var(--olive); border-radius: 8px;
    background: var(--mint); padding: 9px 16px; cursor: pointer; color: var(--olive);
  }
  button:hover { background: #8FF096; }
  button:active { transform: scale(0.98); }
  button.ghost { background: var(--white); border-color: var(--gray-6); color: var(--text-dark); }
  button.ghost:hover { background: var(--gray-9); }

  .view-toggle { display: flex; border: 1px solid var(--olive); border-radius: 8px; overflow: hidden; }
  .view-toggle button { border: none; border-radius: 0; background: var(--white); color: var(--olive); padding: 8px 12px; }
  .view-toggle button.active { background: var(--olive); color: var(--mint); }
  .view-toggle button:hover { background: var(--gray-9); }
  .view-toggle button.active:hover { background: var(--olive); }

  #list { display: flex; flex-direction: column; gap: 8px; }
  .list-row { display: flex; align-items: center; gap: 12px; background: var(--white); border: 1px solid var(--gray-7); border-radius: 10px; padding: 10px 14px; cursor: pointer; }
  .list-row:hover { border-color: var(--gray-5); }
  .list-name { font-size: 14px; font-weight: 600; margin: 0; }
  .list-meta { font-size: 12px; color: var(--matcha); margin: 0; }
  .list-status { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  .list-tags { display: flex; gap: 10px; font-size: 11px; color: var(--matcha); margin-left: auto; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 2rem; color: var(--matcha); font-size: 14px; }

  #board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; }
  .col { min-width: 235px; max-width: 235px; flex-shrink: 0; background: var(--white); border: 1px solid var(--gray-7); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .col-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 6px; }
  .col-title { font-size: 13px; font-weight: 700; }
  .col-count { font-size: 12px; opacity: 0.7; }
  .dropzone { display: flex; flex-direction: column; gap: 8px; min-height: 40px; border-radius: 8px; transition: background 0.1s; }
  .card { background: var(--gray-9); border: 1px solid var(--gray-7); border-radius: 8px; padding: 10px; cursor: grab; }
  .card:active { cursor: grabbing; }
  .card-top { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--lilac); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: var(--text-blue); flex-shrink: 0; }
  .card-name { font-size: 13px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 11px; color: var(--matcha); margin: 0; }
  .card-tags { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; color: var(--matcha); flex-wrap: wrap; align-items: center; }

  .modal-bg { position: fixed; inset: 0; background: rgba(18,18,18,0.5); display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; z-index: 10; }
  .modal { background: var(--white); border-radius: 14px; width: 100%; max-width: 540px; padding: 1.25rem; }
  .section-label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--matcha); font-weight: 700; display: flex; align-items: center; gap: 10px; margin: 22px 0 12px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--gray-7); }
  .section-label:first-of-type { margin-top: 6px; }
  .modal label { font-size: 11px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--matcha); display: block; margin-top: 10px; margin-bottom: 4px; font-weight: 600; }
  .modal input, .modal select, .modal textarea { width: 100%; }
  .modal textarea { min-height: 60px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 10px; }
  #metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric { background: var(--white); border: 1px solid var(--gray-7); border-radius: 12px; padding: 14px 16px; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--matcha); font-weight: 700; margin: 0 0 6px; }
  .metric-value { font-size: 26px; font-weight: 700; color: var(--olive); margin: 0; line-height: 1.1; }
  .metric-sub { font-size: 11px; color: var(--matcha); margin: 4px 0 0; }
  .metric.alert { border-color: #F0997B; background: #FFF7F3; }
  .metric.alert .metric-value { color: #993C1D; }

  .card.dragging { opacity: 0.4; }
  .card.stale { border-color: #F0997B; background: #FFF7F3; }
  .card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-top: 3px; }
  .card-status { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 999px; display: inline-block; }
  .card-role { font-size: 11px; color: var(--text-blue); background: var(--lilac); padding: 2px 7px; border-radius: 999px; display: inline-block; font-weight: 600; }
  .filter-count { font-size: 12px; color: var(--matcha); margin: -8px 0 14px; display: none; }
  button.active-filter { background: var(--olive); color: var(--mint); border-color: var(--olive); }
  button.active-filter:hover { background: var(--pinetree); }
  .card-age { font-size: 11px; color: var(--matcha); }
  .card-age.stale-text { color: #993C1D; font-weight: 600; }
  .panel-chip { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; display: inline-block; }

  .eval-card { background: var(--gray-9); border: 1px solid var(--gray-7); border-left: 3px solid var(--gray-6); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
  .link-wrap { position: relative; display: block; }
  .link-wrap input { width: 100%; padding-right: 38px; }
  .in-field-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-size: 15px; color: var(--gray-5); text-decoration: none; pointer-events: none;
  }
  .in-field-btn.active { color: var(--olive); pointer-events: auto; cursor: pointer; }
  .in-field-btn.active:hover { background: var(--mint); }
  .field-warn { font-size: 11px; color: #993C1D; margin: 4px 0 0; }
  .dup-warn { font-size: 12px; color: #993C1D; background: #FAECE7; border: 1px solid #F0997B; border-radius: 8px; padding: 8px 10px; margin: 6px 0 0; }
  .dup-warn b { color: #7A3B12; }
  .card-link { color: var(--matcha); text-decoration: none; }
  .card-link:hover { color: var(--olive); }
  .card-comments { color: var(--matcha); cursor: pointer; border-radius: 6px; padding: 1px 5px; margin: -1px -3px; display: inline-flex; align-items: center; }
  .card-comments:hover { color: var(--olive); background: var(--mint); }
  .eval-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .eval-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--white); flex-shrink: 0; }
  .eval-name { font-size: 14px; font-weight: 700; color: var(--text-black); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-weight: 700; font-size: 17px; margin: 0; color: var(--olive); }
  .icon-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; background: var(--gray-9); border-color: var(--gray-6); color: var(--text-dark); }
  .modal-footer { display: flex; justify-content: space-between; gap: 8px; margin-top: 1.25rem; }
  .danger { background: var(--peaches); border-color: #E6A87A; color: #7A3B12; }
  .comment { background: var(--gray-9); border-radius: 8px; padding: 8px 10px; }
  .comment p { margin: 0; }
  .comment .meta { font-size: 11px; color: var(--matcha); margin-top: 4px; }

  .score-badge { font-size: 13px; font-weight: 800; padding: 2px 9px; border-radius: 8px; flex-shrink: 0; line-height: 1.4; }
  .rubric { display: flex; flex-direction: column; gap: 8px; }
  .rub-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--gray-9); border: 1px solid var(--gray-7); border-radius: 8px; padding: 8px 12px; }
  .rub-label { font-size: 13px; font-weight: 600; color: var(--text-dark); }
  .stars { display: flex; gap: 3px; font-size: 22px; line-height: 1; }
  .star { cursor: pointer; color: var(--gray-6); user-select: none; transition: color 0.05s; }
  .star.on { color: #F5B301; }
  .rub-score { font-size: 12px; color: var(--matcha); margin: 8px 0 0; text-align: right; }
  .rub-score b { color: var(--olive); font-size: 14px; }

  .final-panel { background: var(--white); border: 1px solid var(--gray-7); border-radius: 12px; padding: 14px 16px; }
  .final-head { display: flex; align-items: center; gap: 14px; }
  .final-score { font-size: 30px; font-weight: 800; padding: 6px 14px; border-radius: 12px; line-height: 1; flex-shrink: 0; }
  .final-title { font-size: 14px; font-weight: 700; color: var(--text-black); }
  .final-sub { font-size: 12px; color: var(--matcha); margin-top: 2px; }
  .crit-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .crit-row { display: flex; align-items: center; gap: 10px; }
  .crit-name { font-size: 12px; font-weight: 600; color: var(--text-dark); width: 92px; flex-shrink: 0; }
  .crit-bar { flex: 1; height: 8px; background: var(--gray-7); border-radius: 999px; overflow: hidden; }
  .crit-fill { display: block; height: 100%; background: var(--olive); border-radius: 999px; }
  .crit-val { font-size: 12px; font-weight: 700; color: var(--olive); width: 28px; text-align: right; flex-shrink: 0; }

  .mini-link { font-size: 11px; font-weight: 600; text-transform: none; letter-spacing: 0; color: var(--olive); background: var(--mint); border: 1px solid var(--olive); border-radius: 6px; padding: 3px 8px; cursor: pointer; }
  .mini-link:hover { background: #8FF096; }
  .guide-crit { border: 1px solid var(--gray-7); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; background: var(--gray-9); }
  .guide-crit-title { font-size: 14px; font-weight: 700; color: var(--olive); margin-bottom: 8px; }
  .guide-level { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; }
  .guide-level + .guide-level { border-top: 1px solid var(--gray-7); }
  .guide-stars { font-size: 15px; white-space: nowrap; color: #F5B301; flex-shrink: 0; letter-spacing: 1px; }
  .guide-stars-off { color: var(--gray-6); }
  .guide-text { font-size: 13px; color: var(--text-dark); line-height: 1.45; }
</style>
</head>
<body>

<div class="topbar-brand">
  <div class="brand-mark">
    <span class="brand-square"></span>
    <div>
      <div class="brand-name">mercanto</div>
      <div class="brand-tag">Reclutamiento</div>
    </div>
  </div>
  <div class="status-banner"><span class="dot-live"></span>En vivo · visible y editable para todo el equipo</div>
</div>

<div class="content">
  <h1>Pipeline de talento</h1>
  <p class="sub">Perfiles, CVs, comentarios y avance del equipo en un solo lugar.</p>
  <p class="last-update" id="lastUpdate"></p>

  <div id="metrics"></div>

  <div class="topbar">
    <input id="search" type="text" placeholder="Buscar por nombre" />
    <select id="filterRole" style="width:145px"></select>
    <select id="filterStage" style="width:145px"></select>
    <select id="filterPending" style="width:165px"></select>
    <button id="btnStale" class="ghost" title="Solo candidatos estancados"><i class="ti ti-alert-triangle" style="font-size:15px;vertical-align:-2px;margin-right:4px"></i>Estancados</button>
    <button id="btnClearFilters" class="ghost" title="Limpiar filtros"><i class="ti ti-x" style="font-size:15px;vertical-align:-2px"></i></button>
    <select id="sortBy" style="width:160px" title="Ordenar candidatos">
      <option value="manual">Orden: mi orden</option>
      <option value="recent">Orden: reciente</option>
      <option value="score">Orden: mejor score</option>
    </select>
    <div class="view-toggle">
      <button id="btnViewBoard" class="active"><i class="ti ti-layout-kanban" style="font-size:16px;vertical-align:-2px;margin-right:4px"></i>Tablero</button>
      <button id="btnViewList"><i class="ti ti-list" style="font-size:16px;vertical-align:-2px;margin-right:4px"></i>Lista</button>
    </div>
    <button id="btnGuide" class="ghost" title="Cómo calificar cada estrella"><i class="ti ti-help-circle" style="font-size:16px;vertical-align:-2px;margin-right:4px"></i>Guía de calificación</button>
    <button id="btnAdd"><i class="ti ti-plus" style="font-size:16px;vertical-align:-2px;margin-right:4px"></i>Nuevo candidato</button>
  </div>
  <p id="filterCount" class="filter-count"></p>

  <div id="board"></div>
  <div id="list" style="display:none"></div>
</div>

<div id="modalRoot"></div>
<div id="guideRoot"></div>

<script>
const STAGES = [
  {key:"Postulado", bg:"#EFF2F7", fg:"#323338"},
  {key:"Entrevista", bg:"#E9DEFC", fg:"#242A42"},
  {key:"Oferta", bg:"#EAFAFF", fg:"#242A42"},
  {key:"Contratado", bg:"#A9FFAE", fg:"#273D37"},
  {key:"Rechazado", bg:"#FFE2CC", fg:"#7A3B12"}
];
// Columnas del tablero: por ASIGNACIÓN (quién es dueño), con Postulado y Rechazado por status
const COLUMNS = [
  {key:"Postulado", type:"status", title:"Postulado", bg:"#EFF2F7", fg:"#323338"},
  {key:"ximena",    type:"assign", title:"Ximena",    bg:"#FBE7DE", fg:"#B0421B"},
  {key:"memo",      type:"assign", title:"Memo",      bg:"#DFF3EA", fg:"#0F6E56"},
  {key:"jocho",     type:"assign", title:"Jocho",     bg:"#E7E5FB", fg:"#4B44B5"},
  {key:"Rechazado", type:"status", title:"Rechazado", bg:"#FFE2CC", fg:"#7A3B12"}
];
function columnOf(c){
  if(c.status === 'Rechazado') return 'Rechazado';
  if(c.assignment === 'ximena' || c.assignment === 'memo' || c.assignment === 'jocho') return c.assignment;
  return 'Postulado';
}
// --- Prevención de duplicados: avisa si ya existe un candidato con nombre parecido ---
function normName(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}
function findSimilar(name, excludeId){
  const target = normName(name);
  if(!target) return [];
  const t2 = target.split(' ').slice(0,2).join(' ');
  return candidates.filter(c=>{
    if(c.id === excludeId) return false;
    const n = normName(c.name);
    if(!n) return false;
    if(n === target) return true; // nombre idéntico (normalizado)
    const nn = n.split(' ');
    return target.split(' ').length>=2 && nn.length>=2 && nn.slice(0,2).join(' ')===t2; // mismo nombre+apellido
  });
}
function updateDupWarning(excludeId){
  const el = document.getElementById('dupWarn');
  if(!el) return;
  const sims = findSimilar(document.getElementById('fName').value, excludeId);
  if(!sims.length){ el.style.display='none'; el.innerHTML=''; return; }
  const lista = sims.map(c=>{
    const cm = COLUMNS.find(x=>x.key===columnOf(c));
    return `<b>${escapeHtml(c.name)}</b> (${cm?cm.title:columnOf(c)} · ${escapeHtml(c.status)})`;
  }).join(', ');
  el.style.display='block';
  el.innerHTML = `<i class="ti ti-alert-triangle" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Ya existe ${sims.length>1?'candidatos parecidos':'un candidato parecido'}: ${lista}. ¿Es la misma persona?`;
}
let candidates = [];
let dragId = null;
let dragDropped = false;
let isDragging = false;
let savesInFlight = 0;
let lastLocalChangeAt = 0;
let viewMode = 'board';

function stageStyle(key){ return STAGES.find(s=>s.key===key) || STAGES[0]; }

function renderList(){
  const list = document.getElementById('list');
  const items = candidates.filter(matchesFilters)
    .sort(sortComparator);

  if(items.length===0){
    list.innerHTML = '<div class="empty-state">No hay candidatos que coincidan con la búsqueda.</div>';
    return;
  }

  list.innerHTML = items.map(c=>{
    const stage = stageStyle(c.status);
    const rs = finalScore(c);
    return `
    <div class="list-row" data-id="${c.id}">
      <div class="avatar">${initials(c.name)}</div>
      <div style="min-width:0">
        <p class="list-name">${escapeHtml(c.name)}</p>
        <p class="list-meta">${c.startDate ? 'Inicio ' + escapeHtml(c.startDate) : 'Sin fecha de inicio'}</p>
      </div>
      ${rs ? `<span class="score-badge" style="background:${scoreColor(rs.score).bg}; color:${scoreColor(rs.score).fg}" title="Resultado final · ${rs.evaluators} de 3 evaluadores">${rs.score}</span>` : ''}
      <span class="list-status" style="background:${stage.bg}; color:${stage.fg}">${stage.key}</span>
      <div class="list-tags">
        ${c.whatsapp ? `<a href="${escapeHtml(waLink(c.whatsapp))}" target="_blank" rel="noopener" class="card-link" title="Escribir por WhatsApp" onclick="event.stopPropagation()"><i class="ti ti-brand-whatsapp" style="font-size:14px;vertical-align:-2px"></i></a>` : ''}
        ${normalizeUrl(c.linkedin) ? `<a href="${escapeHtml(normalizeUrl(c.linkedin))}" target="_blank" rel="noopener" class="card-link" title="Ver LinkedIn" onclick="event.stopPropagation()"><i class="ti ti-brand-linkedin" style="font-size:14px;vertical-align:-2px"></i></a>` : ''}
        ${normalizeUrl(c.cv) ? `<a href="${escapeHtml(normalizeUrl(c.cv))}" target="_blank" rel="noopener" class="card-link" title="Abrir CV" onclick="event.stopPropagation()"><i class="ti ti-file-text" style="font-size:14px;vertical-align:-2px;margin-right:2px"></i>CV</a>` : ''}
        <span class="card-comments" title="Ver y agregar comentarios" onclick="event.stopPropagation(); openModalComments('${c.id}')"><i class="ti ti-message-circle" style="font-size:12px;vertical-align:-1px;margin-right:2px"></i>${totalComments(c)}</span>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.list-row').forEach(row=>{
    row.addEventListener('click', ()=>openModal(row.getAttribute('data-id')));
  });
}

function setView(mode){
  viewMode = mode;
  const board = document.getElementById('board');
  const list = document.getElementById('list');
  const btnBoard = document.getElementById('btnViewBoard');
  const btnList = document.getElementById('btnViewList');
  if(mode==='board'){
    board.style.display = 'flex';
    list.style.display = 'none';
    btnBoard.classList.add('active');
    btnList.classList.remove('active');
  } else {
    board.style.display = 'none';
    list.style.display = 'flex';
    btnList.classList.add('active');
    btnBoard.classList.remove('active');
  }
  render();
}

function decisionColor(d){
  if(d==='Yes') return '#1D9E75';
  if(d==='No') return '#D85A30';
  if(d==='Maybe') return '#BA7517';
  return '#D3DCE6';

const STALE_DAYS = 7;
const ACTIVE_STAGES = ['Postulado','Entrevista','Oferta'];

function daysSince(ts){
  if(!ts) return null;
  return Math.floor((Date.now() - Number(ts)) / 86400000);
}
function stageDays(c){
  return daysSince(c.statusChangedAt || c.updatedAt || c.createdAt);
}
function isStale(c){
  if(!ACTIVE_STAGES.includes(c.status)) return false;
  const d = stageDays(c);
  return d !== null && d >= STALE_DAYS;
}
function interviewDate(c){
  const dates = [c.ximenaInterviewDate, c.memoInterviewDate, c.jochoInterviewDate].filter(Boolean);
  if(!dates.length) return '';
  const today = new Date().toISOString().slice(0,10);
  const upcoming = dates.filter(d=>d>=today).sort();
  return upcoming.length ? upcoming[0] : dates.sort()[dates.length-1];
}
function fmtShortDate(s){
  if(!s) return '';
  const parts = String(s).split('-').map(Number);
  if(parts.length!==3 || parts.some(isNaN)) return '';
  return new Date(parts[0], parts[1]-1, parts[2]).toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
}
function stageDate(c){
  if(c.status==='Entrevista'){ const d=interviewDate(c); return d ? {d, label:'Entrevista'} : null; }
  if(c.status==='Oferta'){ return c.startDate ? {d:c.startDate, label:'Inicio'} : null; }
  if(c.status==='Contratado'){ return c.startDate ? {d:c.startDate, label:'Inicio'} : null; }
  return null;
}
function panelSummary(c){
  const votes = [c.ximenaDecision, c.memoDecision, c.jochoDecision];
  const done = votes.filter(v=>v).length;
  const yes = votes.filter(v=>v==='Yes').length;
  const no = votes.filter(v=>v==='No').length;
  const maybe = votes.filter(v=>v==='Maybe').length;
  let label = 'Sin evaluar', color = '#92939D', bg = '#EFF2F7', icon = '';
  if(done === 0){ /* default */ }
  else if(yes > 0 && no > 0){ label = 'Panel dividido'; color = '#854F0B'; bg = '#FAEEDA'; icon = 'ti-alert-triangle'; }
  else if(done === 3 && yes === 3){ label = 'Panel a favor'; color = '#0F6E56'; bg = '#E1F5EE'; icon = 'ti-circle-check'; }
  else if(done === 3 && no >= 2){ label = 'Panel en contra'; color = '#993C1D'; bg = '#FAECE7'; icon = 'ti-circle-x'; }
  else { label = done + ' de 3 evaluaron'; color = '#242A42'; bg = '#EAFAFF'; icon = 'ti-hourglass'; }
  return { label, color, bg, icon, done, yes, no, maybe };
}
function evalDots(c){
  const evals = [
    {ini:'X', d:c.ximenaDecision, name:'Ximena'},
    {ini:'M', d:c.memoDecision, name:'Memo'},
    {ini:'J', d:c.jochoDecision, name:'Jocho'}
  ];
  const glyph = {'Yes':'✓', 'No':'✕', 'Maybe':'~'};
  return `<span style="display:flex; gap:3px; align-items:center">` + evals.map(e=>{
    const votado = !!e.d;
    const bg = decisionColor(e.d);
    const style = votado
      ? `background:${bg}; color:#fff; border:1px solid ${bg}`
      : `background:#fff; color:#B4B2A9; border:1px dashed #C2CEDB`;
    return `<span title="${e.name}: ${e.d || 'sin evaluar'}" style="${style}; height:18px; padding:0 5px; border-radius:9px; font-size:10px; font-weight:700; display:inline-flex; align-items:center; gap:2px; line-height:1">${e.ini}${votado ? '<span style="font-size:9px">'+glyph[e.d]+'</span>' : ''}</span>`;
  }).join('') + `</span>`;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Score de un evaluador: promedio de los criterios que calificó (x20), o null
function evalRubricScore(c, evalKey){
  const vals = CRITERIA.map(cr=>Number(c[rubKey(evalKey, cr.key)])||0).filter(v=>v>0);
  if(!vals.length) return null;
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  return { score: Math.round(avg*20), filled: vals.length, avg };
}
// Promedio de un criterio entre los evaluadores que lo calificaron (1..5), o null
function criterionAvg(c, critKey){
  const vals = EVALUATORS.map(e=>Number(c[rubKey(e.key, critKey)])||0).filter(v=>v>0);
  if(!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
// Resultado final: promedio de los scores de los evaluadores que calificaron (0..100), o null
function finalScore(c){
  const scores = EVALUATORS.map(e=>evalRubricScore(c, e.key)).filter(Boolean);
  if(!scores.length) return null;
  const avg = scores.reduce((a,b)=>a+b.score,0)/scores.length;
  return { score: Math.round(avg), evaluators: scores.length };
}
function scoreColor(s){
  if(s>=80) return {fg:'#0F6E56', bg:'#E1F5EE'};
  if(s>=60) return {fg:'#854F0B', bg:'#FAEEDA'};
  return {fg:'#993C1D', bg:'#FAECE7'};
}
let sortMode = 'manual';
function orderVal(c){
  return (typeof c.order === 'number' && isFinite(c.order)) ? c.order : (Number(c.updatedAt) || 0);
}
function sortComparator(a,b){
  if(sortMode==='score'){
    const sa = (finalScore(a)||{score:-1}).score;
    const sb = (finalScore(b)||{score:-1}).score;
    if(sb!==sa) return sb-sa;
  }
  if(sortMode==='manual'){
    return orderVal(b) - orderVal(a); // mayor arriba; por defecto = más reciente arriba
  }
  return (b.updatedAt||0)-(a.updatedAt||0);
}
// Bloque de estrellas de rúbrica para un evaluador (dentro de su tarjeta en el modal)
function evalRubricInputs(c, evalKey){
  return `<label>Calificación (rúbrica)</label>
  <div class="rubric">
    ${CRITERIA.map(cr=>`
      <div class="rub-row">
        <span class="rub-label">${cr.label}</span>
        ${starRating('fld_'+rubKey(evalKey, cr.key), c[rubKey(evalKey, cr.key)])}
      </div>`).join('')}
  </div>
  <p class="rub-score" id="score_${evalKey}"></p>`;
}
// Panel de resultado final consolidado (solo lectura, calculado)
function renderFinalResult(c){
  const fs = finalScore(c);
  if(!fs) return '<p class="rub-score" style="text-align:left">Aún no hay calificaciones del panel. Cada evaluador califica en su sección de arriba.</p>';
  const col = scoreColor(fs.score);
  const crits = CRITERIA.map(cr=>{
    const a = criterionAvg(c, cr.key);
    const pct = a ? (a/5*100) : 0;
    return `<div class="crit-row">
      <span class="crit-name">${cr.label}</span>
      <span class="crit-bar"><span class="crit-fill" style="width:${pct}%"></span></span>
      <span class="crit-val">${a ? a.toFixed(1) : '—'}</span>
    </div>`;
  }).join('');
  return `
    <div class="final-head">
      <span class="final-score" style="background:${col.bg}; color:${col.fg}">${fs.score}<span style="font-size:12px;font-weight:600">/100</span></span>
      <div>
        <div class="final-title">Resultado final del panel</div>
        <div class="final-sub">${fs.evaluators} de 3 evaluadores calificaron · promedio de sus scores</div>
      </div>
    </div>
    <div class="crit-list">${crits}</div>`;
}
function paintStars(id, upto){
  const input = document.getElementById(id);
  if(!input) return;

  });
}
function setStar(id, v){
  const input = document.getElementById(id);
  const nv = (Number(input.value)===v) ? 0 : v;
  input.value = String(nv);
  paintStars(id, nv);
  updateRubScore();
}
function updateRubScore(){
  const tmp = {};
  EVALUATORS.forEach(e=>CRITERIA.forEach(cr=>{
    const inp = document.getElementById('fld_'+rubKey(e.key, cr.key));
    if(inp) tmp[rubKey(e.key, cr.key)] = inp.value;
  }));
  EVALUATORS.forEach(e=>{
    const el = document.getElementById('score_'+e.key);
    if(!el) return;
    const s = evalRubricScore(tmp, e.key);
    el.innerHTML = s ? `Score de ${e.label}: <b>${s.score}/100</b> · ${s.filled}/4 criterios` : 'Sin calificar';
  });
  const fEl = document.getElementById('finalResult');
  if(fEl) fEl.innerHTML = renderFinalResult(tmp);
}
function hoverStar(id, v){
  const input = document.getElementById(id);
  paintStars(id, v || (Number(input.value)||0));

function starRating(id, value){
  value = Number(value)||0;
  let html = `<div class="stars"><input type="hidden" id="${id}" value="${value}">`;
  for(let i=1;i<=5;i++){
    html += `<span class="star ${i<=value?'on':''}" data-v="${i}" onclick="setStar('${id}',${i})" onmouseover="hoverStar('${id}',${i})" onmouseout="hoverStar('${id}',0)">★</span>`;
  }
  return html + `</div>`;
}

// Auto-refresh: mantiene el tablero al dia cuando varias personas lo usan a la vez.
// Se salta el refresh si hay ficha abierta, arrastre en curso o guardado pendiente,
// y descarta respuestas que lleguen despues de un cambio local (para no revertirlo).
async function refreshData(){
  if(document.getElementById('modalRoot').innerHTML !== '') return;
  if(isDragging || savesInFlight > 0) return;
  const startedAt = Date.now();
  try{
    const res = await fetch(API_URL);
    const fresh = await res.json();
    if(lastLocalChangeAt > startedAt) return;                             // llegó tarde: descartar
    if(document.getElementById('modalRoot').innerHTML !== '' || isDragging) return; // se abrió algo mientras tanto
    candidates = fresh;
    render();
  }catch(e){ console.error('Error refrescando desde Google Sheets', e); }
}

function matchesFilters(c){
  const search = (document.getElementById('search').value||'').toLowerCase();
  const role = (document.getElementById('filterRole')||{}).value || '';
  const stage = (document.getElementById('filterStage')||{}).value || '';
  const pending = (document.getElementById('filterPending')||{}).value || '';

  if(search && !c.name.toLowerCase().includes(search)) return false;
  if(role && c.role !== role) return false;
  if(stage && c.status !== stage) return false;
  if(staleOnly && !isStale(c)) return false;

  if(pending){
    const p = panelSummary(c);
    if(pending === 'any' && p.done >= 3) return false;
    else if(pending === 'split' && !(p.yes > 0 && p.no > 0)) return false;
    else if(pending === 'Ximena' && c.ximenaDecision) return false;
    else if(pending === 'Memo' && c.memoDecision) return false;
    else if(pending === 'Jocho' && c.jochoDecision) return false;
  }
  return true;
}

function renderFilterCount(){
  const el = document.getElementById('filterCount');
  if(!el) return;
  const activos = (document.getElementById('search').value||'').trim()
    || (document.getElementById('filterRole')||{}).value
    || (document.getElementById('filterStage')||{}).value
    || (document.getElementById('filterPending')||{}).value
    || staleOnly;
  if(!activos){ el.textContent = ''; el.style.display = 'none'; return; }
  const n = candidates.filter(matchesFilters).length;
  el.style.display = 'block';

                </div>
              </div>
              ${rs ? `<span class="score-badge" style="background:${scoreColor(rs.score).bg}; color:${scoreColor(rs.score).fg}" title="Resultado final · ${rs.evaluators} de 3 evaluadores">${rs.score}</span>` : ''}

            </div>
            ${sd ? `<div style="margin-top:6px; font-size:11px; font-weight:600; color:var(--olive); display:flex; align-items:center; gap:4px"><i class="ti ti-calendar-event" style="font-size:12px"></i>${sd.label} ${fmtShortDate(sd.d)}</div>` : ''}
            <div style="margin-top:8px; display:flex; align-items:center; justify-content:space-between; gap:8px">
              <span class="card-age ${stale?'stale-text':''}">
                ${stale ? '<i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:2px"></i>' : ''}${d!==null ? (d===0 ? 'hoy' : d+'d en etapa') : ''}
              </span>
              ${evalDots(c)}
            </div>
            <div class="card-tags">
              ${c.whatsapp ? `<a href="${escapeHtml(waLink(c.whatsapp))}" target="_blank" rel="noopener" class="card-link" title="Escribir por WhatsApp" onclick="event.stopPropagation()"><i class="ti ti-brand-whatsapp" style="font-size:14px;vertical-align:-2px"></i></a>` : ''}
              ${normalizeUrl(c.linkedin) ? `<a href="${escapeHtml(normalizeUrl(c.linkedin))}" target="_blank" rel="noopener" class="card-link" title="Ver LinkedIn" onclick="event.stopPropagation()"><i class="ti ti-brand-linkedin" style="font-size:14px;vertical-align:-2px"></i></a>` : ''}
              ${normalizeUrl(c.cv) ? `<a href="${escapeHtml(normalizeUrl(c.cv))}" target="_blank" rel="noopener" class="card-link" title="Abrir CV" onclick="event.stopPropagation()"><i class="ti ti-file-text" style="font-size:14px;vertical-align:-2px;margin-right:3px"></i>CV</a>` : ''}

            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  board.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=>openModal(card.getAttribute('data-id')));
    card.addEventListener('dragstart', e=>{
      dragId = card.getAttribute('data-id');
      dragDropped = false;
      isDragging = true;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(()=>card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', ()=>{
      card.classList.remove('dragging');
      isDragging = false;
      if(!dragDropped) render(); // se soltó fuera de una columna: restaurar
    });
  });
  board.querySelectorAll('.dropzone').forEach(zone=>{
    zone.addEventListener('dragover', e=>{
      e.preventDefault();
      const draggingEl = board.querySelector('.card.dragging');
      if(!draggingEl) return;
      const after = getDragAfterElement(zone, e.clientY);
      if(after == null) zone.appendChild(draggingEl);
      else zone.insertBefore(draggingEl, after);
    });
    zone.addEventListener('drop', async e=>{
      e.preventDefault();
      dragDropped = true;
      const col = zone.getAttribute('data-col');
      const c = candidates.find(x=>x.id===dragId);
      if(!c){ render(); return; }
      const changedCol = columnOf(c) !== col;
      // En modos ordenados (score/reciente) el reordenamiento vertical no aplica
      if(!changedCol && sortMode !== 'manual'){ render(); return; }
      // Vecinos según la posición final del card arrastrado dentro de la columna
      const draggingEl = zone.querySelector('.card.dragging');
      const upperId = prevCardId(draggingEl);
      const lowerId = nextCardId(draggingEl);
      const upper = upperId ? candidates.find(x=>x.id===upperId) : null;
      const lower = lowerId ? candidates.find(x=>x.id===lowerId) : null;
      const STEP = 1e9;
      if(upper && lower)      c.order = (orderVal(upper) + orderVal(lower)) / 2;
      else if(lower)          c.order = orderVal(lower) + STEP; // arriba del todo
      else if(upper)          c.order = orderVal(upper) - STEP; // hasta abajo
      else                    c.order = Date.now();            // columna vacía
      if(changedCol) applyColumnDrop(c, col);
      c.updatedAt = Date.now();
      render();                 // refleja el cambio al instante
      await apiSaveCandidate(c); // persiste solo el card movido
    });
  });
}
function applyColumnDrop(c, col){
  if(col === 'Postulado'){
    c.assignment = '';
    if(c.status === 'Rechazado'){ c.status = 'Postulado'; c.statusChangedAt = Date.now(); }
  } else if(col === 'Rechazado'){
    if(c.status !== 'Rechazado'){ c.status = 'Rechazado'; c.statusChangedAt = Date.now(); }
  } else { // ximena / memo / jocho
    c.assignment = col;
    if(c.status === 'Rechazado'){ c.status = 'Entrevista'; c.statusChangedAt = Date.now(); }
  }
}
function prevCardId(el){
  let p = el ? el.previousElementSibling : null;
  while(p && !p.classList.contains('card')) p = p.previousElementSibling;
  return p ? p.getAttribute('data-id') : null;
}
function nextCardId(el){
  let n = el ? el.nextElementSibling : null;
  while(n && !n.classList.contains('card')) n = n.nextElementSibling;
  return n ? n.getAttribute('data-id') : null;
}
function getDragAfterElement(zone, y){
  const els = [...zone.querySelectorAll('.card:not(.dragging)')];
  let closest = null, closestOffset = Number.NEGATIVE_INFINITY;
  for(const child of els){
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closestOffset){ closestOffset = offset; closest = child; }
  }
  return closest;
}

function field(id, label, value, placeholder, type){
  type = type || 'text';
  return `<label>${label}</label><input id="${id}" type="${type}" value="${escapeHtml(value)}" placeholder="${placeholder||''}" />`;
}

function decisionOptions(current){
  const opts = ['', 'Yes', 'No', 'Maybe'];
  const labels = {'':'— (sin evaluar)', 'Yes':'Yes', 'No':'No', 'Maybe':'Maybe'};
  return opts.map(o=>`<option value="${o}" ${o===(current||'')?'selected':''}>${labels[o]}</option>`).join('');
}

function waLink(num){
  const digits = (num||'').replace(/\D/g,'');
  if(!digits) return '';
  const full = digits.length === 10 ? '52'+digits : digits;
  return 'https://wa.me/'+full;
}

function normalizeUrl(v){
  const s = (v||'').trim();
  if(!s) return '';
  if(/^https?:\/\//i.test(s)) return s;
  // Solo lo tratamos como URL si parece un dominio (tiene punto y sin espacios)
  if(/^[^\s]+\.[^\s]{2,}/.test(s) && !s.includes(' ')) return 'https://' + s;
  return '';
}

function linkField(id, label, value, placeholder, href, icon){
  const url = href !== undefined && href !== null ? href : normalizeUrl(value);
  const active = !!url;
  const ico = icon || 'ti-external-link';
  const hasText = !!(value||'').trim();
  const btn = active
    ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" class="in-field-btn active" title="Abrir en pestaña nueva" onclick="event.stopPropagation()"><i class="ti ${ico}"></i></a>`
    : `<span class="in-field-btn" title="${hasText ? 'No es un link válido — pega una URL que empiece con https://' : ''}"><i class="ti ${ico}"></i></span>`;
  const warn = (hasText && !active)
    ? `<p class="field-warn">Esto no es un link válido. Pega la URL completa (https://...).</p>` : '';
  return `<label>${label}</label>
  <div class="link-wrap">
    <input id="${id}" type="text" value="${escapeHtml(value)}" placeholder="${placeholder||''}" />
    ${btn}
  </div>${warn}`;
}

}
